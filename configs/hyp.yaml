# 水面光伏锚固系统检测 - 超参数配置
# 适用于YOLOv8/v11/v12系列模型
# Generated: 2026-02-27

# ==================== 优化器配置 ====================
optimizer:
  # 优化器类型: SGD, Adam, AdamW
  type: AdamW
  
  # 学习率
  lr0: 0.001           # 初始学习率
  lrf: 0.01            # 最终学习率 = lr0 * lrf
  
  # 动量
  momentum: 0.937      # SGD momentum / Adam beta1
  
  # 权重衰减
  weight_decay: 0.0005 # 优化器权重衰减
  
  # 学习率调度
  scheduler: cosine    # 学习率调度器: linear, cosine

# ==================== 热身配置 ====================
warmup:
  epochs: 3.0          # 热身轮数
  momentum: 0.8        # 热身初始动量
  bias_lr: 0.1         # 偏置学习率系数

# ==================== 损失权重配置 ====================
loss:
  box: 7.5             # 边框损失增益
  cls: 0.5             # 分类损失增益
  dfl: 1.5             # 分布焦点损失增益
  pose: 12.0           # 关键点损失增益 (如使用)
  kobj: 1.0            # 关键点目标性损失

# ==================== 数据增强配置 ====================
augmentation:
  # 颜色空间增强
  hsv_h: 0.015         # HSV色调 (+/- fraction)
  hsv_s: 0.7           # HSV饱和度
  hsv_v: 0.4           # HSV明度
  
  # 几何变换
  degrees: 10.0        # 图像旋转 (+/- degrees)
  translate: 0.1       # 图像平移 (+/- fraction)
  scale: 0.5           # 图像缩放 (+/- gain)
  shear: 2.0           # 图像剪切 (+/- degrees)
  perspective: 0.0     # 透视变换 (+/- fraction)
  
  # 翻转
  flipud: 0.5          # 上下翻转概率
  fliplr: 0.5          # 左右翻转概率
  
  # 高级增强
  mosaic: 1.0          # Mosaic增强概率 (适合小目标)
  mixup: 0.1           # Mixup增强概率
  copy_paste: 0.0      # 复制粘贴增强概率 (实例分割)
  auto_augment: randaugment  # 自动增强策略
  erasing: 0.4         # 随机擦除概率 (分类)
  
  # 水面场景专用增强
  water_ripple: 0.3    # 水面波纹模拟概率
  glare_simulation: 0.2  # 反光模拟概率
  algae_cover: 0.2     # 藻类覆盖模拟概率

# ==================== 训练配置 ====================
training:
  epochs: 100          # 总训练轮数
  batch: 16            # 批次大小
  imgsz: 640           # 输入图像尺寸
  
  # 硬件配置
  device: auto         # 训练设备: cuda device (0, 1, ...), cpu, auto
  workers: 8           # 数据加载线程数
  
  # 混合精度训练
  amp: true            # 自动混合精度训练
  
  # 早停策略
  patience: 50         # 早停耐心值 (epochs without improvement)
  
  # 断点续训
  resume: false        # 是否从断点续训
  
  # 验证
  val: true            # 训练时进行验证
  save_period: 10      # 每N轮保存检查点
  
  # 其他
  single_cls: false    # 单类别训练模式
  rect: false          # 矩形训练 (加速)
  cos_lr: true         # 余弦学习率调度
  close_mosaic: 10     # 最后N轮禁用mosaic
  
# ==================== 模型特定配置 ====================
# YOLOv8n (Nano) - 轻量级配置
yolov8n:
  base_model: yolov8n.pt
  imgsz: 640
  epochs: 100
  batch: 16
  optimizer: SGD
  lr0: 0.01
  weight_decay: 0.0005

# YOLOv8s (Small)
yolov8s:
  base_model: yolov8s.pt
  imgsz: 640
  epochs: 100
  batch: 16
  optimizer: SGD
  lr0: 0.01

# YOLOv8m (Medium)
yolov8m:
  base_model: yolov8m.pt
  imgsz: 640
  epochs: 100
  batch: 8
  optimizer: SGD
  lr0: 0.01

# YOLOv8l (Large)
yolov8l:
  base_model: yolov8l.pt
  imgsz: 640
  epochs: 100
  batch: 8
  optimizer: SGD
  lr0: 0.01

# YOLOv11-Large (高精度)
yolov11l:
  base_model: yolov11l.pt
  imgsz: 1280
  epochs: 150
  batch: 8
  optimizer: AdamW
  lr0: 0.001
  weight_decay: 0.05

# YOLOv12 (SOTA - 2026年可用)
yolov12:
  base_model: yolov12l.pt  # 或 yolov12x.pt
  imgsz: 1280
  epochs: 150
  batch: 8
  optimizer: AdamW
  lr0: 0.001
  weight_decay: 0.05
  amp: true

# ==================== 评估配置 ====================
evaluation:
  conf_thres: 0.25     # 置信度阈值
  iou_thres: 0.45      # NMS IoU阈值
  max_det: 300         # 最大检测数
  
  # 指标计算
  save_json: true      # 保存结果为COCO JSON格式
  save_hybrid: false   # 保存混合标签
  save_conf: true      # 保存置信度
  save_txt: true       # 保存结果为txt格式

# ==================== 导出配置 ====================
export:
  formats: [onnx, engine]  # 导出格式
  half: true               # FP16半精度
  int8: false              # INT8量化
  simplify: true           # 简化ONNX模型
  opset: 12                # ONNX opset版本
